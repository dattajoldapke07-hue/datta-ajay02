<script>
  const user = localStorage.getItem("user");
  if(!user){
    window.location.href = "login.html"; // redirect if not logged in
  }
</script><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D E-Commerce Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script>
let user = localStorage.getItem("loggedInUser");
if(!user){
  window.location.href = "login.html";
}
</script>
<!-- 3D Intro Screen -->
<div id="intro">
  <h1 class="logo">🛍️ Datta & Ajay's Store</h1>
</div>

<header>
  <h1>My E-Commerce Store</h1>

  <!-- Search & Buttons -->
  <input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">
  <button onclick="toggleDark()">🌙</button>
  <button onclick="viewWishlist()">❤️ Wishlist</button>
  <button onclick="viewCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
</header>

<section id="products"></section>

<!-- Cart Modal -->
<div id="cart-modal" class="hidden">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
  <button onclick="checkout()">Place Order</button>
  <button onclick="closeCart()">Close</button>
</div>

<!-- Wishlist Modal -->
<div id="wishlist-modal" class="hidden">
  <h2>Your Wishlist ❤️</h2>
  <ul id="wishlist-items"></ul>
  <button onclick="closeWishlist()">Close</button>
</div>

<!-- Payment Modal -->
<div id="payment-modal" class="hidden"></div>

<!-- Order Box -->
<div id="order-box" class="hidden"></div>

<!-- Admin Panel -->
<div id="admin-panel" class="hidden">
  <!-- Admin content loaded in admin.html -->
</div>

<script src="script.js"></script>
</body>
</html>
