<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D E-Commerce Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="login-error" style="color:red; display:none;">Invalid username or password!</p>
</div>

<!-- Header -->
<header id="main-header" class="hidden">
  <h1>🛍️ Datta & Ajay's Store</h1>
  <div>
    <button onclick="toggleDark()">🌙</button>
    <a href="wishlist.html" class="nav-btn">❤️ Wishlist</a>
    <a href="cart.html" class="nav-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
  </div>
</header>

<!-- Products -->
<section id="products" class="hidden"></section>

<script src="script.js"></script>
</body>
</html>
