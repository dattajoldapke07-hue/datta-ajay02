<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D E-Commerce Store</title>
  <style>
    /* --- 3D Gradient Background --- */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #fff;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px);
    }

    input[type="text"], input[type="password"] {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: rgba(255,255,255,0.2);
      color: #fff;
      font-weight: bold;
    }

    .hidden { display: none; }

    #intro {
      text-align: center;
      margin-top: 50px;
    }

    #products {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
      justify-content: center;
    }

    /* --- Modals --- */
    #cart-modal, #wishlist-modal, #payment-modal, #order-box, #admin-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border-radius: 10px;
      color: #fff;
      width: 300px;
      max-height: 80vh;
      overflow-y: auto;
      z-index: 1000;
    }

    /* --- Login Overlay --- */
    #login-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      flex-direction: column;
    }

    #login-overlay h2 {
      margin-bottom: 20px;
    }

    #login-overlay input {
      display: block;
      margin: 10px 0;
      width: 200px;
    }

    #login-overlay button {
      margin-top: 10px;
      width: 220px;
    }
  </style>
</head>
<body>

<!-- --- Login Overlay --- -->
<div id="login-overlay">
  <h2>Login to Enter Store</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="login-error" style="color:red; display:none;">Invalid username or password!</p>
</div>

<!-- 3D Intro Screen -->
<div id="intro" class="hidden">
  <h1 class="logo">🛍️ Datta & Ajay's Store</h1>
</div>

<header class="hidden" id="main-header">
  <h1>My E-Commerce Store</h1>

  <!-- Search & Buttons -->
  <input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">
  <button onclick="toggleDark()">🌙</button>
  <button onclick="viewWishlist()">❤️ Wishlist</button>
  <button onclick="viewCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
</header>

<section id="products" class="hidden"></section>

<!-- Cart Modal -->
<div id="cart-modal" class="hidden">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
  <button onclick="checkout()">Place Order</button>
  <button onclick="closeCart()">Close</button>
</div>

<!-- Wishlist Modal -->
<div id="wishlist-modal" class="hidden">
  <h2>Your Wishlist ❤️</h2>
  <ul id="wishlist-items"></ul>
  <button onclick="closeWishlist()">Close</button>
</div>

<!-- Payment Modal -->
<div id="payment-modal" class="hidden"></div>

<!-- Order Box -->
<div id="order-box" class="hidden"></div>

<!-- Admin Panel -->
<div id="admin-panel" class="hidden"></div>

<script>
  // --- Login Function ---
  function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("login-error");

    if(username === "admin" && password === "1234") {
      // Save login status
      localStorage.setItem("loggedInUser", username);

      // Hide login overlay
      document.getElementById("login-overlay").style.display = "none";

      // Show main content
      document.getElementById("intro").classList.remove("hidden");
      document.getElementById("main-header").classList.remove("hidden");
      document.getElementById("products").classList.remove("hidden");
    } else {
      errorMsg.style.display = "block";
    }
  }

  // --- Auto-check if already logged in ---
  document.addEventListener("DOMContentLoaded", function() {
    const user = localStorage.getItem("loggedInUser");
    if(user) {
      document.getElementById("login-overlay").style.display = "none";
      document.getElementById("intro").classList.remove("hidden");
      document.getElementById("main-header").classList.remove("hidden");
      document.getElementById("products").classList.remove("hidden");
    }
  });

  // --- Dummy placeholder functions ---
  function searchProduct(){console.log("Search triggered");}
  function toggleDark(){console.log("Dark mode toggle");}
  function viewWishlist(){console.log("View Wishlist");}
  function viewCart(){console.log("View Cart");}
  function checkout(){console.log("Checkout");}
  function closeCart(){document.getElementById("cart-modal").classList.add("hidden");}
  function closeWishlist(){document.getElementById("wishlist-modal").classList.add("hidden");}
</script>

</body>
</html>
