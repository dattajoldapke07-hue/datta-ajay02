<!DOCTYPE html>
<html>
<head>
  <title>Order Bill</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 50px;
      background: #f5f5f5;
    }

    h2, h3 {
      color: #ff6f61;
    }

    #bill {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      display: inline-block;
      text-align: left;
      max-width: 500px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border-radius: 10px;
      border: 2px solid #ff6f61;
      background: white;
      color: #ff6f61;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #ff6f61;
      color: white;
    }

    p {
      margin: 5px 0;
    }
  </style>
</head>
<body>

<h2>🎉 Order Confirmed!</h2>

<div id="bill">
  <!-- Bill content dynamically generated -->
</div>

<button onclick="backToShop()">⬅ Back to Shop</button>

<script>
function showBill(){
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  if(orders.length === 0){
    document.getElementById("bill").innerHTML = "<p>No recent orders found.</p>";
    return;
  }
  let lastOrder = orders[orders.length - 1];
  let html = `<h3>Order ID: ${lastOrder.id}</h3>`;
  html += `<p>Date & Time: ${lastOrder.date}</p>`;
  html += `<p>Payment Method: ${lastOrder.method}</p>`;
  html += `<p>Total: ₹${lastOrder.total}</p>`;
  html += "<hr>";
  lastOrder.items.forEach(item => {
    html += `<p>${item.name} x ${item.qty} = ₹${item.price * item.qty}</p>`;
  });
  html += "<hr>";
  html += "<p>Delivery: Arrives in 3-5 working days 🚚</p>";
  document.getElementById("bill").innerHTML = html;
}

function backToShop(){
  window.location.href = "index.html";
}

showBill();
</script>

</body>
</html>
