<!DOCTYPE html>
<html>
<head>
  <title>Order Bill</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    .bill-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .total {
      font-weight: bold;
      margin-top: 20px;
    }
  </style>

</head>
<body>

<div class="bill-box">
  <h2>🧾 Order Bill</h2>

  <div id="items"></div>

  <div class="total">
    Total: ₹<span id="total"></span>
  </div>

  <p>📦 Delivery in 3–5 days</p>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let itemsDiv = document.getElementById("items");
let total = 0;

cart.forEach(item => {
  itemsDiv.innerHTML += `
    <div class="item">
      <span>${item.name} x ${item.qty}</span>
      <span>₹${item.price * item.qty}</span>
    </div>
  `;
  total += item.price * item.qty;
});

document.getElementById("total").innerText = total;
  localStorage.removeItem("cart");
</script>

</body>
</html>
