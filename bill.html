<!DOCTYPE html>
<html>
<head>
  <title>Your Bill</title>
  <style>
    body { text-align: center; font-family: Arial; margin-top: 50px; background: #f5f5f5; }
    #bill { background: #fff; padding: 20px; border-radius: 10px; width: 350px; margin-left:auto; margin-right:auto; box-shadow: 0 0 15px rgba(0,0,0,0.2); text-align: left; }
    h3 { color: #ff6f61; }
    button { padding: 10px 20px; margin-top: 15px; font-size: 16px; border-radius: 8px; border: 2px solid #ff6f61; background: white; color: #ff6f61; cursor: pointer; transition: 0.3s; }
    button:hover { background: #ff6f61; color: white; transform: scale(1.05); }
  </style>
</head>
<body>

<div id="bill">
  <h3>✅ Order Confirmed</h3>
  <div id="billDetails"></div>
  <p style="color:green; font-weight:bold;">Delivery arrives in 3-5 working days 🚚</p>
  <button onclick="backHome()">🏠 Back to Home</button>
</div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let lastOrder = orders[orders.length - 1]; // last placed order
let billDetails = document.getElementById("billDetails");

billDetails.innerHTML = `<p>Order ID: ${lastOrder.id}</p>
  <p>Date & Time: ${lastOrder.date}</p>
  <p>Total: ₹${lastOrder.total}</p>
  ${lastOrder.items.map(item => `<p>${item.name} x ${item.qty} = ₹${item.price*item.qty}</p>`).join("")}`;

function backHome() { window.location.href = "index.html"; }
</script>

</body>
</html>
