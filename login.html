<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Login</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    #loginBox {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    h2 {
      margin-bottom: 20px;
      color: #ff6f61;
    }

    input {
      padding: 10px;
      width: 90%;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      margin-top: 15px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #ff6f61;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff3b2e;
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="loginBox">
  <h2>User Login</h2>
  <input type="text" id="username" placeholder="Enter Username" required><br>
  <input type="password" id="password" placeholder="Enter Password" required><br>
  <button onclick="loginUser()">Login</button>
  <div class="error" id="errorMsg"></div>
</div>

<script>
function loginUser(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorDiv = document.getElementById("errorMsg");

  // Check for empty username
  if(!username){
    errorDiv.innerText = "Please enter username";
    return;
  }

  // Check if password contains special characters
  const specialChar = /[^a-zA-Z0-9]/;
  if(specialChar.test(password)){
    errorDiv.innerText = "Invalid login! No special characters allowed.";
    return;
  }

  // Valid login → go to shopping page
  errorDiv.innerText = "";
  localStorage.setItem("user", username); // optional: save username
  window.location.href = "index.html";
}
</script>

</body>
</html>
