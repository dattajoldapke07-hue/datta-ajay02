<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #login-box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 95%;
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #ff6f61;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff3b2e;
    }

    h2 {
      color: #ff6f61;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div id="login-box">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  // 1️⃣ ADMIN CHECK FIRST
  if(user === "admin" && pass === "admin123"){
    window.location.href = "admin.html";
    return;
  }

  // 2️⃣ USER CHECK
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let matched = users.find(u => u.username === user && u.password === pass);

  if(matched){
    window.location.href = "index.html";
    return;
  }

  // 3️⃣ INVALID
  alert("Invalid Credentials ❌");
}

// Default user create if none
(function(){
  let users = JSON.parse(localStorage.getItem("users")) || [];
  if(users.length === 0){
    users.push({username: "user1", password: "user123"});
    localStorage.setItem("users", JSON.stringify(users));
  }
})();
</script>

</body>
</html>
