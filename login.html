<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<style>
  body { font-family: Arial; text-align:center; margin-top:100px; background:#f5f5f5;}
  input { padding:10px; margin:10px; width:200px; font-size:16px;}
  button { padding:10px 20px; font-size:16px; cursor:pointer; border-radius:8px;}
</style>
</head>
<body>

<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<script>
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === "admin" && pass === "admin123") {
        localStorage.setItem("role", "admin");
        window.location.href = "admin.html";
    }
    else if(user === "user" && pass === "user123") {
        localStorage.setItem("role", "user");
        window.location.href = "index.html";
    }
    else {
        alert("Invalid Credentials ❌");
    }
}
</script>

</body>
</html>
