<h3>All Orders 🛒</h3>
<div id="orders"></div>

<script>
function loadOrders() {
  const ordersDiv = document.getElementById("orders");
  ordersDiv.innerHTML = "";

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  if(orders.length === 0){
    ordersDiv.innerHTML = "<p>No orders yet.</p>";
    return;
  }

  orders.forEach(order => {
    let orderCard = document.createElement("div");
    orderCard.style.border = "2px solid #ff6f61";
    orderCard.style.padding = "15px";
    orderCard.style.marginBottom = "15px";
    orderCard.style.borderRadius = "10px";
    orderCard.style.background = "#fff0f2";

    let itemsHTML = "";
    order.items.forEach(item => {
      itemsHTML += `<p>${item.name} x ${item.qty} = ₹${item.price * item.qty}</p>`;
    });

    orderCard.innerHTML = `
      <h4>Order ID: ${order.id}</h4>
      <p><strong>Date & Time:</strong> ${order.date}</p>
      ${itemsHTML}
      <p><strong>Total Bill:</strong> ₹${order.total}</p>
    `;
    ordersDiv.appendChild(orderCard);
  });
}
