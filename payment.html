<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="payment-container">
  <h2>Select Payment Method</h2>

  <div class="payment-buttons">
    <button onclick="showUPI()">💳 UPI</button>
    <button onclick="payCOD()">📦 Cash on Delivery</button>
  </div>

  <!-- UPI BOX -->
  <div id="upiBox" class="upi-box">
    <h3>Enter UPI ID</h3>
    <input type="text" id="upi" placeholder="example@upi">
    <button onclick="payUPI()">Pay Now</button>
  </div>
</div>

<script>
function showUPI(){
  document.getElementById("upiBox").style.display = "block";
}

function payUPI(){
  let upi = document.getElementById("upi").value;

  if(upi === ""){
    alert("Please enter UPI ID");
  } else {
    alert("UPI Payment Successful 🎉");
    localStorage.removeItem("cart");
    window.location.href = "index.html";
  }
}

function payCOD(){
  alert("Order Placed with Cash on Delivery 📦");
  localStorage.removeItem("cart");
  window.location.href = "index.html";
}
</script>

</body>
</html>
