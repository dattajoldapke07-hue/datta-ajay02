<!DOCTYPE html>
<html>
<body>

<h2>Select Payment Method</h2>

<button onclick="showUPI()">UPI</button>
<button onclick="showCard()">Card</button>

<div id="upiBox" style="display:none;">
  <h3>Enter UPI</h3>
  <input id="upi">
  <button onclick="payUPI()">Pay</button>
</div>

<div id="cardBox" style="display:none;">
  <h3>Card</h3>
  <input id="card">
  <button onclick="payCard()">Pay</button>
</div>

<script>
function showUPI(){
  document.getElementById("upiBox").style.display = "block";
}

function showCard(){
  document.getElementById("cardBox").style.display = "block";
}

function payUPI(){
  alert("UPI Success");
}

function payCard(){
  alert("Card Success");
}
</script>

</body>
</html>
